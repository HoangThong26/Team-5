<div class="reset-bg">
  <div class="reset-container">

    <div class="reset-header">
      <div class="reset-icon">
        <i class="fas fa-lock-open"></i>
      </div>
      <h2>Đặt lại mật khẩu</h2>
      <p class="reset-subtitle">Nhập mã OTP và mật khẩu mới</p>
    </div>

    @if (successMessage) {
      <div class="alert alert-success">
        <i class="fas fa-check-circle"></i> {{ successMessage }}
      </div>
    }

    @if (errorMessage) {
      <div class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #resetForm="ngForm">

      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input
          type="email"
          required
          [(ngModel)]="email"
          name="email"
          placeholder="example&#64;email.com"
        />
      </div>

      <div class="input-group">
        <label><i class="fas fa-hashtag"></i> Mã OTP</label>
        <input
          type="text"
          required
          [(ngModel)]="token"
          name="token"
          placeholder="Nhập mã OTP từ email"
        />
      </div>

      <div class="input-group">
        <label><i class="fas fa-lock"></i> Mật khẩu mới</label>
        <input
          type="password"
          required
          minlength="6"
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="••••••••"
        />
      </div>

      <div class="input-group">
        <label><i class="fas fa-lock"></i> Xác nhận mật khẩu</label>
        <input
          type="password"
          required
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
        />
      </div>

      <button class="submit-btn" type="submit" [disabled]="resetForm.invalid || isLoading">
        @if (isLoading) {
          <i class="fas fa-spinner fa-spin"></i> Đang xử lý...
        } @else {
          <i class="fas fa-save"></i> Đặt lại mật khẩu
        }
      </button>

    </form>

    <div class="back-link">
      <a routerLink="/login"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    </div>

  </div>
</div>
