<div class="forgot-bg">
  <div class="forgot-container">

    <div class="forgot-header">
      <div class="forgot-icon">
        <i class="fas fa-key"></i>
      </div>
      <h2>Quên mật khẩu</h2>
      <p class="forgot-subtitle">Nhập email để nhận mã OTP</p>
    </div>

    @if (successMessage) {
      <div class="alert alert-success">
        <i class="fas fa-check-circle"></i> {{ successMessage }}
      </div>
    }

    @if (errorMessage) {
      <div class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">

      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input
          type="email"
          required
          [(ngModel)]="email"
          name="email"
          placeholder="example&#64;email.com"
        />
      </div>

      <button class="submit-btn" type="submit" [disabled]="forgotForm.invalid || isLoading">
        @if (isLoading) {
          <i class="fas fa-spinner fa-spin"></i> Đang gửi...
        } @else {
          <i class="fas fa-paper-plane"></i> Gửi OTP
        }
      </button>

    </form>

    <div class="back-link">
      <a routerLink="/reset-password"><i class="fas fa-lock"></i> Đã có OTP? Đặt lại mật khẩu</a>
    </div>

    <div class="back-link">
      <a routerLink="/login"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    </div>

  </div>
</div>
