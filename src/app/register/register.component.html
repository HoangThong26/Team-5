<div class="register-bg">
  <div class="register-container">

    <div class="register-header">
      <div class="register-icon">
        <i class="fas fa-user-plus"></i>
      </div>
      <h2>Create New Account</h2>
      <p class="register-subtitle">Register to get started</p>
    </div>

    @if (successMessage) {
      <div class="alert alert-success">
        <i class="fas fa-check-circle"></i> {{ successMessage }}
      </div>
    }

    @if (errorMessage) {
      <div class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">

      <div class="input-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input
          type="text"
          required
          [(ngModel)]="fullName"
          name="fullName"
          placeholder="John Doe"
        />
      </div>

      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input
          type="email"
          required
          [(ngModel)]="email"
          name="email"
          placeholder="example&#64;email.com"
        />
      </div>

      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input
          type="password"
          required
          minlength="8"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
        />
        <small class="password-hint">At least 8 characters, 1 uppercase, 1 number, 1 special character.</small>
      </div>

      <div class="input-group">
        <label><i class="fas fa-phone"></i> Phone Number</label>
        <input
          type="tel"
          [(ngModel)]="phone"
          name="phone"
          placeholder="0912 345 678"
        />
      </div>

      <button class="register-btn" type="submit" [disabled]="isLoading">
        @if (isLoading) {
          <i class="fas fa-spinner fa-spin"></i> Processing...
        } @else {
          <i class="fas fa-user-plus"></i> Register
        }
      </button>

    </form>

    <div class="login-link">
      Already have an account? <a routerLink="/login">Sign In</a>
    </div>

  </div>
</div>
