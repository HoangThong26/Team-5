<div class="rounded-3xl bg-white p-6 shadow-sm">
  <div class="flex items-center justify-between gap-3">
    <div>
      <h3 class="text-xl font-semibold text-slate-900">Grade Distribution</h3>
    </div>
  </div>

  @if (hasData()) {
    <div class="mt-6 h-80">
      <canvas
        baseChart
        [type]="'bar'"
        [data]="barChartData()"
        [options]="barChartOptions"
      ></canvas>
    </div>
  } @else {
    <div class="mt-6 rounded-2xl border border-dashed border-slate-300 px-6 py-12 text-center">
      <p class="text-sm font-medium text-slate-500">Chưa có dữ liệu phân phối điểm.</p>
    </div>
  }
</div>
